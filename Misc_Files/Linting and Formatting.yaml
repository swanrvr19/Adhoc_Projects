name: Linting and Formatting

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PIP_NO_INPUT: "1"

jobs:
  embedded-sql-check:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]' }}
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Install the project
      env:
        UV_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        UV_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: uv sync --dev

    - name: Check embedded SQL formatting in Python
      shell: bash
      run: |
        mapfile -t py_files < <(git ls-files '*.py')
        if [ ${#py_files[@]} -gt 0 ]; then
          uv run embedded-sql --check --diff "${py_files[@]}"
        fi

    - name: Check embedded SQL formatting in notebooks via nbqa
      shell: bash
      run: |
        mapfile -t notebooks < <(git ls-files '*.ipynb')
        if [ ${#notebooks[@]} -gt 0 ]; then
          uv run nbqa embedded-sql --nbqa-shell --check --diff "${notebooks[@]}"
        fi

  ruff-check:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]' }}
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Ruff check
      run: uvx ruff check

  ruff-format-check:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]' }}
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Strip trailing blank lines from .py files
      shell: bash
      run: |
        mapfile -t py_files < <(git ls-files '*.py' '*.pyi')
        for f in "${py_files[@]}"; do
          if [ -f "$f" ]; then
            # Remove trailing blank lines.
            sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' "$f"

            # Ensure the file ends with exactly one newline. Ruff in Databricks
            # doesn't reliably add a missing EOF newline for source notebooks,
            # so we add it here to prevent format-check failures.
            if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
              echo >> "$f"
            fi
          fi
        done

    - name: Ruff format check
      run: uvx ruff format --check --diff
  
  pylint:
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Install the project
      env:
        UV_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        UV_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: uv sync --dev

    - name: Run pylint (with databricks)
      run: uv run --with databricks-labs-pylint pylint --load-plugins=databricks.labs.pylint.all --ignore=.venv --recursive=y .

    - name: Run pylint on notebooks
      shell: bash
      run: |
        mapfile -t notebooks < <(git ls-files '*.ipynb')
        if [ ${#notebooks[@]} -gt 0 ]; then
          uv run --with databricks-labs-pylint nbqa pylint \
            --load-plugins=databricks.labs.pylint.all \
            --disable=C0103,E0602 \
            "${notebooks[@]}"
        fi

  ty:
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Install the project
      env:
        UV_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        UV_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: uv sync --dev

    - name: Run ty
      run: uv run ty check .

  pytest:
    runs-on: uhg-runner
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      with:
        python-version: '3.12'

    - name: Install uv
      env:
        PIP_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        PIP_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: python -m pip install --upgrade pip uv

    - name: Install the project
      env:
        UV_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@edgeinternal1uhg.optum.com/artifactory/api/pypi/glb-pypi-vir/simple
        UV_EXTRA_INDEX_URL: https://${{ secrets.JFROG_User }}:${{ secrets.JFROG_Token }}@centraluhg.jfrog.io/artifactory/api/pypi/glb-pypi-vir/simple
      run: uv sync --dev

    - name: Run pytest
      run: uv run pytest
